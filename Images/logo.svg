<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#gradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Musical notes as flowing waves -->
  <!-- Left note -->
  <g transform="translate(70, 60)">
    <circle cx="0" cy="0" r="8" fill="url(#waveGradient)"/>
    <path d="M 0,-8 Q 5,-25 10,-40" stroke="url(#waveGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Right note -->
  <g transform="translate(110, 80)">
    <circle cx="0" cy="0" r="8" fill="url(#waveGradient)"/>
    <path d="M 0,-8 Q -5,-28 -8,-45" stroke="url(#waveGradient)" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Center connecting wave flow -->
  <path d="M 50,120 Q 70,100 90,115 T 130,110 Q 145,105 160,120" 
        stroke="url(#waveGradient)" stroke-width="4" fill="none" stroke-linecap="round"/>
  
  <!-- Additional flowing dots -->
  <g opacity="0.8">
    <circle cx="50" cy="85" r="4" fill="#00d4ff"/>
    <circle cx="150" cy="95" r="4" fill="#00d4ff"/>
    <circle cx="100" cy="145" r="4" fill="#0099cc"/>
  </g>
</svg>